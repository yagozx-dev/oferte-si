{% extends "base.html" %}
{% load static %}

{% block title %}{% if usuario %}Editar{% else %}Novo{% endif %} Usuário — Oferte{% endblock %}

{% block content %}
<div class="md-app-bar">
  <a href="/usuarios/" class="md-btn md-btn--tonal" style="text-decoration:none;">
    <span class="material-icons">arrow_back</span>
  </a>
  <span class="md-app-bar__title">{% if usuario %}Editar{% else %}Novo{% endif %} Usuário</span>
</div>

<div class="page-enter">
  <div class="md-card md-card--elevated" style="max-width:600px;margin:24px auto;">
    <form id="usuario-form">
      <div id="form-errors" style="display:none;background-color:var(--md-sys-color-error-container);color:var(--md-sys-color-on-error-container);padding:12px;border-radius:var(--md-sys-shape-small);margin-bottom:16px;font-size:14px;"></div>

      <div class="md-text-field">
        <input type="text" id="nome" placeholder=" " required>
        <label for="nome">Nome</label>
      </div>

      <div class="md-row">
        <div class="md-col md-col--6">
          <div class="md-text-field">
            <input type="text" id="cpf" placeholder=" " data-mask="cpf" required>
            <label for="cpf">CPF</label>
          </div>
        </div>
        <div class="md-col md-col--6">
          <div class="md-text-field">
            <input type="text" id="telefone" placeholder=" " data-mask="phone">
            <label for="telefone">Telefone</label>
          </div>
        </div>
      </div>

      <div class="md-text-field">
        <input type="email" id="email" placeholder=" " required>
        <label for="email">E-mail</label>
      </div>

      <div class="md-dropdown">
        <select id="cargo">
          <option value="dizimista">Dizimista</option>
          <option value="admin">Administrador</option>
        </select>
        <label>Cargo</label>
      </div>

      <div class="md-row">
        <div class="md-col md-col--6">
          <label class="md-switch">
            <input type="checkbox" id="is_active" checked>
            <div class="md-switch__track">
              <div class="md-switch__thumb"></div>
            </div>
            <span>Ativo</span>
          </label>
        </div>
        <div class="md-col md-col--6">
          <label class="md-switch">
            <input type="checkbox" id="is_dizimista">
            <div class="md-switch__track">
              <div class="md-switch__thumb"></div>
            </div>
            <span>Dizimista</span>
          </label>
        </div>
      </div>

      <div class="md-text-field" id="password-field">
        <input type="password" id="password" placeholder=" " {% if not usuario %}required{% endif %}>
        <label for="password">{% if usuario %}Nova senha (deixe em branco para manter){% else %}Senha{% endif %}</label>
        <button type="button" onclick="mdTogglePassword('password')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);border:none;background:none;cursor:pointer;color:var(--md-sys-color-on-surface-variant);">
          <span class="material-icons">visibility</span>
        </button>
      </div>

      <div style="display:flex;gap:12px;margin-top:24px;">
        <button type="submit" class="md-btn md-btn--filled flex-1">Salvar</button>
        <a href="/usuarios/" class="md-btn md-btn--outlined flex-1" style="text-align:center;text-decoration:none;">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{% static 'js/pages/usuario-form.js' %}"></script>
{% endblock %}
