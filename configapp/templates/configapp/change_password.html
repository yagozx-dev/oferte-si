{% extends "base.html" %}
{% load static %}

{% block title %}Alterar Senha — Oferte{% endblock %}

{% block content %}
<div class="md-app-bar">
  <a href="/configuracoes/" class="md-btn md-btn--tonal" style="text-decoration:none;">
    <span class="material-icons">arrow_back</span>
  </a>
  <span class="md-app-bar__title">Alterar Senha</span>
</div>

<div class="page-enter">
  <div class="md-card md-card--elevated" style="max-width:500px;margin:24px auto;">
    <form id="change-password-form">
      <div id="form-errors" style="display:none;background-color:var(--md-sys-color-error-container);color:var(--md-sys-color-on-error-container);padding:12px;border-radius:var(--md-sys-shape-small);margin-bottom:16px;font-size:14px;"></div>
      <div id="form-success" style="display:none;background-color:#E8F5E9;color:#2E7D32;padding:12px;border-radius:var(--md-sys-shape-small);margin-bottom:16px;font-size:14px;"></div>

      <div class="md-text-field">
        <input type="password" id="old_password" placeholder=" " required>
        <label for="old_password">Senha atual</label>
        <button type="button" onclick="mdTogglePassword('old_password')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);border:none;background:none;cursor:pointer;color:var(--md-sys-color-on-surface-variant);">
          <span class="material-icons">visibility</span>
        </button>
      </div>

      <div class="md-text-field">
        <input type="password" id="new_password" placeholder=" " required minlength="8">
        <label for="new_password">Nova senha (mín. 8 caracteres)</label>
        <button type="button" onclick="mdTogglePassword('new_password')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);border:none;background:none;cursor:pointer;color:var(--md-sys-color-on-surface-variant);">
          <span class="material-icons">visibility</span>
        </button>
      </div>

      <div class="md-text-field">
        <input type="password" id="confirm_password" placeholder=" " required>
        <label for="confirm_password">Confirmar nova senha</label>
        <button type="button" onclick="mdTogglePassword('confirm_password')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);border:none;background:none;cursor:pointer;color:var(--md-sys-color-on-surface-variant);">
          <span class="material-icons">visibility</span>
        </button>
      </div>

      <button type="submit" class="md-btn md-btn--filled w-full">Alterar Senha</button>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{% static 'js/pages/change-password.js' %}"></script>
{% endblock %}
