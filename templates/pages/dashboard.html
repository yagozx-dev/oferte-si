{% extends "base.html" %}
{% load static %}

{% block title %}Dashboard — Oferte{% endblock %}

{% block content %}
<div class="md-app-bar">
  <span class="material-icons" style="font-size:28px;">dashboard</span>
  <span class="md-app-bar__title">Dashboard</span>
</div>

<div class="page-enter">
  <div class="summary-row" id="dashboard-resumo">
    <div class="md-card md-card--elevated">
      <div class="text-small text-muted">Total de Usuários</div>
      <div style="font-size:32px;font-weight:700;" id="total-usuarios">—</div>
    </div>
    <div class="md-card md-card--elevated">
      <div class="text-small text-muted">Dizimistas</div>
      <div style="font-size:32px;font-weight:700;" id="total-dizimistas">—</div>
    </div>
    <div class="md-card md-card--elevated">
      <div class="text-small text-muted">Ofertas (mês)</div>
      <div style="font-size:32px;font-weight:700;" id="total-ofertas-mes">—</div>
    </div>
    <div class="md-card md-card--elevated">
      <div class="text-small text-muted">Valor (mês)</div>
      <div style="font-size:32px;font-weight:700;" id="total-valor-mes">—</div>
    </div>
  </div>

  <div class="md-card md-card--elevated">
    <h3 style="margin-bottom:16px;">Ofertas dos Últimos 6 Meses</h3>
    <div class="chart-bars" id="chart-bars">
      <div style="width:100%;text-align:center;color:var(--md-sys-color-on-surface-variant);padding:24px;">Carregando...</div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{% static 'js/pages/dashboard.js' %}"></script>
{% endblock %}
